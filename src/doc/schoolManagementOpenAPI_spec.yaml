openapi: 3.0.0
info:
  title: school management
  version: 1.0.0
  description: ''
servers:
  - url: http://localhost:7777
paths:
  /api/v1/schools:
    get:
      summary: schools
      parameters:
        - name: longitude
          in: query
          schema:
            type: number
          example: 88.303748
        - name: latitude
          in: query
          schema:
            type: number
          example: 22.618595
      responses:
        '200':
          description: schools
          headers:
            X-Powered-By:
              schema:
                type: string
              example: Express
            Content-Length:
              schema:
                type: integer
              example: 257
            ETag:
              schema:
                type: string
              example: W/"101-8t9hF5dDn2TWKL9rOW8wiy3NziI"
            Date:
              schema:
                type: string
              example: Sat, 25 Apr 2026 09:57:47 GMT
            Connection:
              schema:
                type: string
              example: keep-alive
            Keep-Alive:
              schema:
                type: string
              example: timeout=5
    post:
      summary: school
      responses:
        '201':
          description: school
          headers:
            X-Powered-By:
              deprecated: false
              schema: {}
              example: Express
            Content-Length:
              deprecated: false
              schema: {}
              example: '233'

                type: string
              example: W/"57-N2EpeFMhk4m1yX5sjohkoxjt2ZA"
            Date:
              schema:
                type: string
              example: Sat, 25 Apr 2026 09:58:56 GMT
            Connection:
              schema:
                type: string
              example: keep-alive
            Keep-Alive:
              schema:
                type: string
              example: timeout=5
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
            example:
              name: The Heritage Academy
              address: >-
                West Chowbaga Rd, Mundapara, Chak Kolarkhal, Kolkata, West
